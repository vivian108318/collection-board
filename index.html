<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連結收藏看板</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M7 3a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v26.5a1 1 0 0 1-1.45.9L16 26l-7.55 4.4A1 1 0 0 1 7 29.5V3z' fill='%238E9775'/%3E%3Cpath d='M12 9h8M12 14h5' stroke='%23fff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://iwwqavbnaejdewonejll.supabase.co">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #FAF9F6;
            --color-sage: #8E9775;
            --color-earth: #A98467;
            --color-sand: #E2D1C3;
            --color-text: #4A4A4A;
            --color-rose: #B5838D;
            --color-slate: #6D6875;
            --color-card: #ffffff;
            --color-border: #EAE7E2;
            --color-hover: #EFEDE8;
            --color-chip-bg: #F1F0EC;
            --color-input-border: #E5E3DE;
            --color-header-bg: rgba(250, 249, 246, 0.92);
        }
        html.dark {
            --color-bg: #1a1a1e;
            --color-text: #d4d4d4;
            --color-card: #25252b;
            --color-border: #35353d;
            --color-hover: #30303a;
            --color-chip-bg: #2a2a32;
            --color-input-border: #3a3a44;
            --color-header-bg: rgba(26, 26, 30, 0.92);
        }
        html.dark .card-soft { background: var(--color-card); border-color: var(--color-border); }
        html.dark .card-link:hover { box-shadow: 0 10px 20px -8px rgba(0,0,0,0.4); }
        html.dark .btn-ghost:hover { background: var(--color-hover); }
        html.dark .cat-chip { background: var(--color-chip-bg); }
        html.dark .cat-chip:hover { background: var(--color-hover); }
        html.dark .cat-chip.active { background: var(--color-card); }
        html.dark .input { background: var(--color-card); border-color: var(--color-input-border); color: var(--color-text); }
        html.dark .modal { background: var(--color-card); }
        html.dark .toast { background: #e2e2e2; color: #1a1a1e; }
        html.dark .color-swatch { border-color: var(--color-card); }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
        }
        h1, h2, h3, .font-serif {
            font-family: 'Noto Serif TC', serif;
        }
        .card-soft {
            background: var(--color-card);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .card-link:hover {
            box-shadow: 0 10px 20px -8px rgba(74, 74, 74, 0.12);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: var(--color-sage);
            color: #ffffff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, opacity 0.15s;
        }
        .btn-primary:hover { background: #7e8666; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-ghost {
            color: var(--color-text);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.15s;
        }
        .btn-ghost:hover { background: #EFEDE8; }
        .cat-chip {
            padding: 0.375rem 0.875rem;
            border-radius: 999px;
            font-size: 13px;
            color: var(--color-text);
            background: #F1F0EC;
            border: 1px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s;
        }
        .cat-chip:hover { background: #E9E7E1; }
        .cat-chip.active {
            background: #ffffff;
            border-color: currentColor;
            font-weight: 700;
        }
        .input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #E5E3DE;
            border-radius: 8px;
            background: #ffffff;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: var(--color-text);
        }
        .input:focus {
            border-color: var(--color-sage);
            box-shadow: 0 0 0 3px rgba(142, 151, 117, 0.15);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(40, 38, 32, 0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal {
            background: #ffffff;
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .spinner {
            border: 2px solid #EAE7E2;
            border-top-color: var(--color-sage);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #2D3748;
            color: #ffffff;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            max-width: 90vw;
            text-align: center;
        }
        .toast.show { opacity: 1; }
        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            border: 2px solid #ffffff;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .color-swatch:hover { transform: scale(1.08); }
        .color-swatch.selected {
            box-shadow: 0 0 0 2px var(--color-bg), 0 0 0 4px var(--color-sage);
        }
        .masonry {
            column-count: 3;
            column-gap: 1.25rem;
        }
        .masonry > * {
            break-inside: avoid;
            margin-bottom: 1.25rem;
        }
        @media (max-width: 1023px) {
            .masonry { column-count: 2; }
        }
        @media (max-width: 639px) {
            .masonry { column-count: 1; }
        }
    </style>
</head>
<body>

    <div id="config-warning" class="hidden fixed top-0 inset-x-0 bg-amber-100 text-amber-900 text-xs px-4 py-2 text-center z-50 border-b border-amber-200">
        尚未填入 Supabase 設定 — 請編輯 <code>index.html</code> 最上方的 <code>SUPABASE_URL</code> 與 <code>SUPABASE_ANON_KEY</code>
    </div>

    <section id="auth-view" class="hidden min-h-screen flex items-center justify-center px-6">
        <div class="max-w-sm w-full">
            <div class="text-center mb-8">
                <span class="text-xs tracking-[0.25em] text-gray-400 uppercase block mb-3">Link Board</span>
                <h1 class="text-3xl font-bold mb-3">連結收藏看板</h1>
                <p class="text-sm text-gray-500 leading-relaxed">把散落在各處收藏的網址，<br>一鍵分類、預覽、隨時找得到。</p>
            </div>
            <div class="card-soft p-6">
                <label class="block text-[11px] text-gray-500 mb-2 tracking-[0.15em] uppercase">Email</label>
                <input id="auth-email" type="email" class="input mb-4" placeholder="you@example.com" autocomplete="email">
                <button id="auth-send" class="btn-primary w-full">寄送登入連結</button>
                <p id="auth-msg" class="text-xs text-gray-500 mt-4 text-center hidden leading-relaxed"></p>
            </div>
        </div>
    </section>

    <section id="board-view" class="hidden">
        <header class="sticky top-0 backdrop-blur-md z-30 border-b" style="background-color:var(--color-header-bg);border-color:var(--color-border)">
            <div class="max-w-6xl mx-auto px-5 sm:px-6 pt-4 pb-3 flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <span class="text-[10px] tracking-[0.25em] text-gray-400 uppercase block">Link Board</span>
                    <h1 class="text-xl font-bold truncate">連結收藏看板</h1>
                </div>
                <div class="flex items-center gap-1 sm:gap-2">
                    <button id="btn-add-link" class="btn-primary whitespace-nowrap" aria-label="新增連結">＋ 新連結</button>
                    <div class="relative">
                        <button id="btn-menu" class="btn-ghost" aria-label="更多選項">⋯</button>
                        <div id="menu" class="hidden absolute right-0 top-full mt-1 w-48 card-soft py-1 text-sm overflow-hidden">
                            <button id="btn-darkmode" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">深色模式</button>
                            <button id="btn-show-id" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">顯示我的 User ID</button>
                            <button id="btn-signout" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">登出</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Search + Sort -->
            <div class="max-w-6xl mx-auto px-5 sm:px-6 pb-3">
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
                        <input id="search-input" class="input pl-9 pr-8" placeholder="搜尋標題或描述…" aria-label="搜尋連結">
                        <button id="search-clear" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden" aria-label="清除搜尋" style="font-size:16px;line-height:1;padding:2px">✕</button>
                    </div>
                    <div class="relative">
                        <button id="btn-sort" class="btn-ghost text-sm whitespace-nowrap flex items-center gap-1" aria-label="排序方式">
                            <span id="sort-label">最新加入</span>
                            <svg class="w-3 h-3 opacity-50" viewBox="0 0 12 12" fill="currentColor"><path d="M3 5l3 3 3-3"/></svg>
                        </button>
                        <div id="sort-menu" class="hidden absolute right-0 top-full mt-1 w-40 card-soft py-1 text-sm z-40">
                            <button data-sort="newest" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)] font-semibold">最新加入</button>
                            <button data-sort="oldest" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">最早加入</button>
                            <button data-sort="title" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">標題 A→Z</button>
                            <button data-sort="site" class="w-full text-left px-4 py-2 hover:bg-[var(--color-hover,#F5F3EE)]">依網站分組</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Category chips -->
            <div class="max-w-6xl mx-auto px-5 sm:px-6 pb-3 overflow-x-auto">
                <div id="cat-bar" class="flex gap-2 whitespace-nowrap"></div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-5 sm:px-6 py-8">
            <div id="loading" class="text-center py-16">
                <div class="spinner mx-auto mb-3"></div>
                <p class="text-sm text-gray-400">載入中…</p>
            </div>
            <div id="links-grid" class="masonry"></div>
            <div id="loading-more" class="hidden text-center py-6">
                <div class="spinner mx-auto"></div>
            </div>
            <div id="empty" class="hidden text-center py-24">
                <div class="text-5xl mb-4 opacity-30">📎</div>
                <p class="text-gray-400 text-sm">這裡還沒有收藏<br class="sm:hidden">，點右上「＋ 新連結」來加第一筆</p>
            </div>
        </main>
    </section>

    <div id="modals"></div>
    <div id="toast" class="toast"></div>

    <script>
    // ================================================================
    //  Config — 從 Supabase Dashboard 複製
    // ================================================================
    const SUPABASE_URL = 'https://iwwqavbnaejdewonejll.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_kS0MfJOSI9R5KDdJqN892A_dGqt_H35';

    const DEFAULT_CATEGORIES = [
        { name: '生活樂趣', color: '#8E9775', sort_order: 1 },
        { name: '食譜',     color: '#A98467', sort_order: 2 },
        { name: '行銷',     color: '#B5838D', sort_order: 3 },
        { name: 'AI 工具',  color: '#6D6875', sort_order: 4 },
        { name: '平面設計', color: '#C98A6B', sort_order: 5 },
    ];
    const COLOR_PALETTE = ['#8E9775', '#A98467', '#B5838D', '#6D6875', '#C98A6B', '#7A8B99'];
    const SORT_LABELS = { newest: '最新加入', oldest: '最早加入', title: '標題 A→Z', site: '依網站分組' };
    const PAGE_SIZE = 20;

    const state = {
        session: null,
        categories: [],
        links: [],
        filterCategoryId: null,
        searchQuery: '',
        sortKey: localStorage.getItem('linkboard_sort') || 'newest',
        pageOffset: 0,
        hasMore: true,
        loading: false,
        categoryCounts: {},
    };
    let sb = null;
    let _modalCloseCallback = null;

    // ================================================================
    //  Raw-fetch helper — 繞開 supabase-js 在某些情境會卡住的問題
    // ================================================================
    async function sbREST(path, opts = {}) {
        const token = state.session?.access_token;
        const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            ...opts,
            headers: {
                apikey: SUPABASE_ANON_KEY,
                Authorization: 'Bearer ' + token,
                'Content-Type': 'application/json',
                ...(opts.headers || {}),
            },
        });
        const text = await r.text();
        if (!r.ok) {
            return { data: null, error: { message: text || r.statusText, status: r.status } };
        }
        return { data: text ? JSON.parse(text) : null, error: null };
    }

    // ================================================================
    //  Boot
    // ================================================================
    async function boot() {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            document.getElementById('config-warning').classList.remove('hidden');
            document.getElementById('auth-view').classList.remove('hidden');
            return;
        }
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await sb.auth.getSession();
        state.session = session;
        if (session) {
            await showBoard();
        } else {
            showAuth();
        }
        sb.auth.onAuthStateChange(async (event, newSession) => {
            state.session = newSession;
            if (event === 'SIGNED_IN') await showBoard();
            if (event === 'SIGNED_OUT') showAuth();
        });
    }

    // ================================================================
    //  Auth view
    // ================================================================
    function showAuth() {
        _boardReady = false;
        document.getElementById('auth-view').classList.remove('hidden');
        document.getElementById('board-view').classList.add('hidden');
    }

    document.getElementById('auth-send').addEventListener('click', async () => {
        if (!sb) { toast('尚未設定 Supabase'); return; }
        const email = document.getElementById('auth-email').value.trim();
        const msg = document.getElementById('auth-msg');
        if (!email) return toast('請輸入 email');
        const btn = document.getElementById('auth-send');
        btn.disabled = true;
        btn.textContent = '寄送中…';
        const { error } = await sb.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: location.href },
        });
        btn.disabled = false;
        btn.textContent = '寄送登入連結';
        if (error) {
            toast('寄送失敗：' + error.message);
            return;
        }
        msg.textContent = '已寄出登入連結，請到信箱點擊（同一個分頁會自動登入）。';
        msg.classList.remove('hidden');
    });

    // ================================================================
    //  Board view
    // ================================================================
    let _boardReady = false;
    async function showBoard() {
        if (_boardReady) return;
        _boardReady = true;
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('board-view').classList.remove('hidden');
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('links-grid').innerHTML = '';
        document.getElementById('empty').classList.add('hidden');

        // Load in parallel
        await Promise.all([loadCategories(), loadLinks(), loadCategoryCounts()]);

        if (state.categories.length === 0) {
            try { await seedDefaultCategories(); } catch {}
            await loadCategories();
        }
        renderCategories();
        renderLinks();
    }

    async function loadCategories() {
        const { data, error } = await sbREST('categories?select=*&order=sort_order.asc');
        if (error) { toast('載入分類失敗：' + error.message); return; }
        state.categories = data || [];
    }

    async function seedDefaultCategories() {
        const uid = state.session.user.id;
        const rows = DEFAULT_CATEGORIES.map(c => ({ ...c, user_id: uid }));
        const { error } = await sbREST('categories', {
            method: 'POST',
            headers: { Prefer: 'return=minimal' },
            body: JSON.stringify(rows),
        });
        if (error && !/duplicate key|unique/i.test(error.message)) {
            toast('建立預設分類失敗：' + error.message);
        }
    }

    async function loadCategoryCounts() {
        const { data } = await sbREST('links?select=category_id&limit=10000');
        const counts = {};
        if (data) for (const r of data) { const k = r.category_id || '__none__'; counts[k] = (counts[k] || 0) + 1; }
        state.categoryCounts = counts;
    }

    async function loadLinks(append = false) {
        if (state.loading) return;
        state.loading = true;
        if (!append) state.pageOffset = 0;

        let path = `links?select=*&limit=${PAGE_SIZE}&offset=${state.pageOffset}`;

        // Sort — pinned always first
        let order = 'pinned.desc';
        switch (state.sortKey) {
            case 'newest': order += ',created_at.desc'; break;
            case 'oldest': order += ',created_at.asc'; break;
            case 'title':  order += ',title.asc'; break;
            case 'site':   order += ',site_name.asc,created_at.desc'; break;
        }
        path += '&order=' + order;

        // Category filter
        if (state.filterCategoryId) {
            path += '&category_id=eq.' + state.filterCategoryId;
        }

        // Search
        if (state.searchQuery) {
            const q = state.searchQuery.replace(/[%_*,().]/g, '');
            if (q) path += `&or=(title.ilike.*${encodeURIComponent(q)}*,description.ilike.*${encodeURIComponent(q)}*)`;
        }

        const { data, error } = await sbREST(path);
        if (error) { toast('載入連結失敗：' + error.message); state.loading = false; return; }

        const newLinks = data || [];
        state.links = append ? state.links.concat(newLinks) : newLinks;
        state.pageOffset = state.links.length;
        state.hasMore = newLinks.length >= PAGE_SIZE;
        state.loading = false;
    }

    async function resetAndLoadLinks() {
        state.links = [];
        state.pageOffset = 0;
        state.hasMore = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('links-grid').innerHTML = '';
        document.getElementById('empty').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('loading-more').classList.add('hidden');
        await loadLinks();
        renderLinks();
    }

    async function refreshLinks() {
        state.links = [];
        state.pageOffset = 0;
        state.hasMore = true;
        await Promise.all([loadLinks(), loadCategoryCounts()]);
        renderCategories();
        renderLinks();
    }

    async function loadMoreLinks() {
        if (state.loading || !state.hasMore) return;
        document.getElementById('loading-more').classList.remove('hidden');
        await loadLinks(true);
        const grid = document.getElementById('links-grid');
        const rendered = grid.children.length;
        for (let i = rendered; i < state.links.length; i++) {
            grid.appendChild(cardEl(state.links[i]));
        }
        document.getElementById('loading-more').classList.toggle('hidden', !state.hasMore);
    }

    function renderCategories() {
        const bar = document.getElementById('cat-bar');
        const counts = state.categoryCounts;
        const totalCount = Object.values(counts).reduce((a, b) => a + b, 0);
        bar.innerHTML = '';
        bar.appendChild(chipEl('全部', null, state.filterCategoryId === null, '#4A4A4A', totalCount));
        for (const cat of state.categories) {
            bar.appendChild(chipEl(cat.name, cat.id, state.filterCategoryId === cat.id, cat.color, counts[cat.id] || 0));
        }
        const addBtn = document.createElement('button');
        addBtn.className = 'cat-chip text-gray-400';
        addBtn.style.borderStyle = 'dashed';
        addBtn.style.borderColor = '#CFC8BC';
        addBtn.textContent = '＋ 新分類';
        addBtn.addEventListener('click', openCategoryModal);
        bar.appendChild(addBtn);

        // 選了某個分類時，末端顯示編輯按鈕
        const activeCat = state.categories.find(c => c.id === state.filterCategoryId);
        if (activeCat) {
            const editBtn = document.createElement('button');
            editBtn.className = 'cat-chip';
            editBtn.style.color = activeCat.color;
            editBtn.style.borderStyle = 'solid';
            editBtn.style.borderColor = activeCat.color + '66';
            editBtn.innerHTML = '✎ 編輯「' + escapeHtml(activeCat.name) + '」';
            editBtn.addEventListener('click', () => openEditCategoryModal(activeCat));
            bar.appendChild(editBtn);
        }
    }

                ${link.description ? `<p class="text-xs text-gray-500 line-clamp-3 leading-relaxed">${escapeHtml(link.description)}</p>` : ''}

                        <span class="truncate">${time ? escapeHtml(time) + ' · ' : ''}${escapeHtml(host)}</span>
                    </div>
                    <div class="flex items-center gap-1 flex-shrink-0 flex-wrap justify-end">

                        <button class="btn-ghost text-xs" style="padding:0.25rem 0.5rem" data-action="pin">${link.pinned ? '取消釘選' : '釘選'}</button>

        el.querySelector('[data-action="pin"]').addEventListener('click', () => togglePin(link));
        el.querySelector('[data-action="edit"]').addEventListener('click', () => openEditLinkModal(link));
        el.querySelector('[data-action="delete"]').addEventListener('click', () => deleteLink(link));
        el.querySelector('[data-action="recat"]').addEventListener('click', () => openRecatModal(link));

    // ================================================================
    //  Helpers
    // ================================================================
    function safeHost(url) {
        try { return new URL(url).hostname.replace(/^www\./, ''); }
        catch { return url || ''; }
    }
    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function hexToSoft(hex) {
        const h = (hex || '#A98467').replace('#','');
        const r = parseInt(h.slice(0,2),16);
        const g = parseInt(h.slice(2,4),16);
        const b = parseInt(h.slice(4,6),16);
        return `rgba(${r},${g},${b},0.14)`;
    }
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2600);
    }
    function relativeTime(dateStr) {
        const now = Date.now();
        const then = new Date(dateStr).getTime();
        const diff = now - then;
        const mins = Math.floor(diff / 60000);
        const hrs = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 60) return '剛剛';
        if (hrs < 24) return hrs + ' 小時前';
        if (days < 3) return days + ' 天前';
        const d = new Date(dateStr);
        return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
    }

    // ================================================================
    //  Modals
    // ================================================================
    function closeModal() {
        document.getElementById('modals').innerHTML = '';
        if (_modalCloseCallback) {
            const cb = _modalCloseCallback;
            _modalCloseCallback = null;
            cb();
        }
    }
    function mountModal(html) {
        document.getElementById('modals').innerHTML =
            `<div class="modal-backdrop" id="backdrop"><div class="modal" id="modal-content" role="dialog" aria-modal="true">${html}</div></div>`;
        document.getElementById('backdrop').addEventListener('click', (e) => {
            if (e.target.id === 'backdrop') closeModal();
        });
        // Focus trap
        const modal = document.getElementById('modal-content');
        setTimeout(() => {
            const focusable = [...modal.querySelectorAll('button, input, select, textarea')].filter(el => el.offsetParent !== null && !el.disabled);
            if (focusable.length) focusable[0].focus();
            modal.addEventListener('keydown', (e) => {
                if (e.key !== 'Tab') return;
                const visible = [...modal.querySelectorAll('button, input, select, textarea')].filter(el => el.offsetParent !== null && !el.disabled);
                if (!visible.length) return;
                const first = visible[0], last = visible[visible.length - 1];
                if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
                else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
            });
        }, 50);
    }
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    function confirmModal(message) {
        return new Promise(resolve => {
            _modalCloseCallback = () => resolve(false);
            mountModal(`
                <h3 class="font-serif text-lg font-bold mb-3">確認</h3>
                <p class="text-sm text-gray-600 mb-5 leading-relaxed whitespace-pre-line">${escapeHtml(message)}</p>
                <div class="flex justify-end gap-2">
                    <button id="cf-no" class="btn-ghost">取消</button>
                    <button id="cf-yes" class="btn-primary" style="background:var(--color-rose)">確定</button>
                </div>
            `);
            document.getElementById('cf-no').addEventListener('click', () => {
                _modalCloseCallback = null; closeModal(); resolve(false);
            });
            document.getElementById('cf-yes').addEventListener('click', () => {
                _modalCloseCallback = null; closeModal(); resolve(true);
            });
        });
    }

    async function fetchAndPreview() {
        const url = document.getElementById('l-url').value.trim();
        if (!url) return toast('請先貼上網址');
        const wrap = document.getElementById('l-preview-wrap');
        const img = document.getElementById('l-preview-img');
        wrap.classList.remove('hidden');
        img.innerHTML = '<div class="spinner"></div>';
        document.getElementById('l-title').value = '';
        document.getElementById('l-desc').value = '';
        document.getElementById('l-thumb').value = '';
        try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 9000);
            const r = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url), { signal: ctrl.signal });
            clearTimeout(timer);
            const j = await r.json();
            if (j.status !== 'success') throw new Error(j.message || 'microlink error');
            const d = j.data || {};
            document.getElementById('l-title').value = d.title || '';
            document.getElementById('l-desc').value = d.description || '';
            let thumb = d.image && d.image.url ? d.image.url : '';
            document.getElementById('l-thumb').value = thumb;
            if (thumb) {
                img.innerHTML = `<img src="${escapeHtml(thumb)}" class="w-full h-full object-cover" referrerpolicy="no-referrer" onerror="this.remove()">`;
            } else {
                img.innerHTML = '<span class="text-xs text-gray-500 px-4 text-center">此連結沒有圖片，可稍後手動補上</span>';
            }
        } catch (err) {
            img.innerHTML = '<span class="text-xs text-gray-500 px-4 text-center">抓不到預覽，請手動填標題／描述／縮圖</span>';
        }
        document.getElementById('l-save').classList.remove('hidden');
    }
    async function saveNewLink() {
        const url = document.getElementById('l-url').value.trim();
        if (!url) return toast('請輸入網址');

        // Capture form data before potential confirm modal replaces the DOM
        const row = {
            user_id: state.session.user.id,
            url,
            title: document.getElementById('l-title').value.trim() || null,
            description: document.getElementById('l-desc').value.trim() || null,
            thumbnail_url: document.getElementById('l-thumb').value.trim() || null,
            category_id: document.getElementById('l-cat').value || null,
            site_name: safeHost(url),
        };

        // Duplicate check
        const { data: existing } = await sbREST(`links?url=eq.${encodeURIComponent(url)}&select=id&limit=1`);
        if (existing && existing.length > 0) {
            const yes = await confirmModal('這個網址已經存過了，確定要再存一次嗎？');
            if (!yes) return;
        }

        const btn = document.getElementById('l-save');
        if (btn) { btn.disabled = true; btn.textContent = '儲存中…'; }

        const { error } = await sbREST('links', {
            method: 'POST',
            headers: { Prefer: 'return=minimal' },
            body: JSON.stringify(row),
        });
        if (error) {
            toast('儲存失敗：' + error.message);
            if (btn) { btn.disabled = false; btn.textContent = '儲存'; }
            return;
        }
        closeModal();
        await refreshLinks();
        toast('已新增');
    }

    async function togglePin(link) {
        const newPinned = !link.pinned;
        if (newPinned) {
            const catFilter = link.category_id
                ? `category_id=eq.${link.category_id}`
                : 'category_id=is.null';
            const { data } = await sbREST(`links?select=id&${catFilter}&pinned=eq.true`);
            if (data && data.length >= 3) {
                return toast('此分類最多釘選 3 個連結');
            }
        }
        const { error } = await sbREST(`links?id=eq.${link.id}`, {
            method: 'PATCH',
            headers: { Prefer: 'return=minimal' },
            body: JSON.stringify({ pinned: newPinned }),
        });
        if (error) return toast('操作失敗：' + error.message);
        toast(newPinned ? '已釘選' : '已取消釘選');
        await refreshLinks();
    }

    async function deleteLink(link) {
        const yes = await confirmModal('確定刪除這個連結嗎？');
        if (!yes) return;
        const { error } = await sbREST(`links?id=eq.${link.id}`, { method: 'DELETE' });
        if (error) return toast('刪除失敗：' + error.message);
        await refreshLinks();
        toast('已刪除');
    }

    // ================================================================
    //  Top-right buttons
    // ================================================================
    // ================================================================
    //  Search handler
    // ================================================================
    let _searchTimer;
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', () => {
        searchClear.classList.toggle('hidden', !searchInput.value);
        clearTimeout(_searchTimer);
        _searchTimer = setTimeout(() => {
            state.searchQuery = searchInput.value.trim();
            resetAndLoadLinks();
        }, 300);
    });
    searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.classList.add('hidden');
        if (state.searchQuery) {
            state.searchQuery = '';
            resetAndLoadLinks();
        }
        searchInput.focus();
    });

    // ================================================================
    //  Sort handler
    // ================================================================
    // Init sort label from saved preference
    document.getElementById('sort-label').textContent = SORT_LABELS[state.sortKey] || '最新加入';
    document.querySelectorAll('#sort-menu [data-sort]').forEach(b => {
        b.classList.toggle('font-semibold', b.dataset.sort === state.sortKey);
    });

    document.getElementById('btn-sort').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('sort-menu').classList.toggle('hidden');
    });
    document.querySelectorAll('#sort-menu [data-sort]').forEach(btn => {
        btn.addEventListener('click', () => {
            state.sortKey = btn.dataset.sort;
            localStorage.setItem('linkboard_sort', state.sortKey);
            document.getElementById('sort-label').textContent = SORT_LABELS[state.sortKey];
            document.getElementById('sort-menu').classList.add('hidden');
            document.querySelectorAll('#sort-menu [data-sort]').forEach(b => {
                b.classList.toggle('font-semibold', b.dataset.sort === state.sortKey);
            });
            resetAndLoadLinks();
        });
    });

    // ================================================================
    //  Infinite scroll
    // ================================================================
    let _scrollTimer;
    window.addEventListener('scroll', () => {
        clearTimeout(_scrollTimer);
        _scrollTimer = setTimeout(() => {
            if (state.loading || !state.hasMore) return;
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            if (scrollHeight - scrollTop - clientHeight < 400) {
                loadMoreLinks();
            }
        }, 150);
    });

    // ================================================================
    //  Top-right buttons
    // ================================================================
    document.getElementById('btn-add-link').addEventListener('click', openAddLinkModal);
    document.getElementById('btn-menu').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('menu').classList.toggle('hidden');
    });
    document.addEventListener('click', () => {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('sort-menu').classList.add('hidden');
    });
    // Dark mode
    function applyDarkMode(dark) {
        document.documentElement.classList.toggle('dark', dark);
        document.getElementById('btn-darkmode').textContent = dark ? '淺色模式' : '深色模式';
    }
    applyDarkMode(localStorage.getItem('linkboard_dark') === '1');
    document.getElementById('btn-darkmode').addEventListener('click', () => {
        const isDark = !document.documentElement.classList.contains('dark');
        localStorage.setItem('linkboard_dark', isDark ? '1' : '0');
        applyDarkMode(isDark);
    });

    document.getElementById('btn-signout').addEventListener('click', async () => {
        await sb.auth.signOut();
    });
    document.getElementById('btn-show-id').addEventListener('click', async () => {
        const id = state.session && state.session.user ? state.session.user.id : null;
        if (!id) return;
        try {
            await navigator.clipboard.writeText(id);
            toast('已複製 User ID：' + id);
        } catch {
            prompt('你的 User ID（設定 iOS 捷徑時會用到）：', id);
        }
    });

    boot();
    </script>
</body>
</html>
